<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Sagrada Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --gold: #d4af37; --text: #f0f0f0; --muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; }
        
        .tela { display: none; min-height: 100vh; padding: 20px; max-width: 800px; margin: 0 auto; }
        .ativa { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
        header h1 { font-family: 'Merriweather', serif; color: var(--gold); font-size: 26px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 12px; border: none; background: var(--panel); color: var(--muted); border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tab.active { background: var(--gold); color: #000; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .item { background: var(--panel); padding: 15px 5px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.2s; font-size: 14px; }
        .item:active { transform: scale(0.95); border-color: var(--gold); }
        .grid-caps { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); }

        .top-bar { display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); padding: 15px 0; border-bottom: 1px solid #333; z-index: 100; }
        .back-btn { background: none; border: none; color: var(--gold); font-size: 20px; cursor: pointer; }
        .titulo-livro { font-family: 'Merriweather', serif; font-size: 18px; color: var(--gold); }
        
        #conteudo-biblia { margin-top: 20px; line-height: 1.8; font-family: 'Merriweather', serif; padding-bottom: 100px; }
        .versiculo { margin-bottom: 15px; padding: 8px; border-radius: 5px; }
        .num { color: var(--gold); font-weight: bold; font-size: 0.8em; margin-right: 10px; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: var(--gold)">Sincronizando Bíblia...</p>
    </div>

    <div id="tela-livros" class="tela ativa">
        <header><h1>Bíblia Sagrada</h1></header>
        <div class="tabs">
            <button class="tab active" onclick="mudarAba('vt', this)">Antigo</button>
            <button class="tab" onclick="mudarAba('nt', this)">Novo</button>
        </div>
        <div id="lista-livros" class="grid"></div>
    </div>

    <div id="tela-capitulos" class="tela">
        <div class="top-bar">
            <button class="back-btn" onclick="irPara('tela-livros')"><i class="fa-solid fa-chevron-left"></i> Voltar</button>
            <h2 id="nome-livro-topo" class="titulo-livro"></h2>
            <div style="width: 40px;"></div>
        </div>
        <div id="lista-capitulos" class="grid grid-caps" style="margin-top:20px"></div>
    </div>

    <div id="tela-leitura" class="tela">
        <div class="top-bar">
            <button class="back-btn" onclick="irPara('tela-capitulos')"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 id="titulo-cap" class="titulo-livro"></h2>
            <div style="width: 40px;"></div>
        </div>
        <div id="conteudo-biblia"></div>
    </div>

    <script>
        const estruturaLivros = {
            vt: ["Gênesis", "Êxodo", "Levítico", "Números", "Deuteronômio", "Josué", "Juízes", "Rute", "1 Samuel", "2 Samuel", "1 Reis", "2 Reis", "1 Crônicas", "2 Crônicas", "Esdras", "Neemias", "Ester", "Jó", "Salmos", "Provérbios", "Eclesiastes", "Cantares", "Isaías", "Jeremias", "Lamentações", "Ezequiel", "Daniel", "Oseias", "Joel", "Amós", "Obadias", "Jonas", "Miqueias", "Naum", "Habacuque", "Sofonias", "Ageu", "Zacarias", "Malaquias"],
            nt: ["Mateus", "Marcos", "Lucas", "João", "Atos", "Romanos", "1 Coríntios", "2 Coríntios", "Gálatas", "Efésios", "Filipenses", "Colossenses", "1 Tessalonicenses", "2 Tessalonicenses", "1 Timóteo", "2 Timóteo", "Tito", "Filemom", "Hebreus", "Tiago", "1 Pedro", "2 Pedro", "1 João", "2 João", "3 João", "Judas", "Apocalipse"]
        };

        let bibliaCompleta = null;
        let livroSelecionado = null;

        async function carregarNuvem() {
            try {
                // USANDO PROXY CDN PARA EVITAR BLOQUEIO E ERRO DE MEMÓRIA
                const url = 'https://cdn.jsdelivr.net/gh/thiagobodruk/biblia@master/json/pt_nvi.json';
                const res = await fetch(url);
                bibliaCompleta = await res.json();
                document.getElementById('loader').style.display = 'none';
            } catch (err) {
                document.getElementById('loader').innerHTML = '<p style="color: #ff6b6b; padding: 20px; text-align: center;">Erro de Sincronização. <br> Verifique sua internet móvel.</p>';
            }
        }

        function mudarAba(tipo, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderizarLivros(tipo);
        }

        function renderizarLivros(tipo) {
            const container = document.getElementById('lista-livros');
            container.innerHTML = '';
            estruturaLivros[tipo].forEach(nome => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = nome;
                div.onclick = () => abrirCapitulos(nome);
                container.appendChild(div);
            });
        }

        function abrirCapitulos(nome) {
            livroSelecionado = bibliaCompleta.find(l => l.name === nome);
            irPara('tela-capitulos');
            document.getElementById('nome-livro-topo').innerText = nome;
            const container = document.getElementById('lista-capitulos');
            container.innerHTML = '';
            livroSelecionado.chapters.forEach((cap, i) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = i + 1;
                div.onclick = () => lerCapitulo(i);
                container.appendChild(div);
            });
        }

        function lerCapitulo(index) {
            irPara('tela-leitura');
            document.getElementById('titulo-cap').innerText = `${livroSelecionado.name} ${index + 1}`;
            const container = document.getElementById('conteudo-biblia');
            container.innerHTML = '';
            livroSelecionado.chapters[index].forEach((texto, i) => {
                const p = document.createElement('p');
                p.className = 'versiculo';
                p.innerHTML = `<span class="num">${i+1}</span> ${texto}`;
                container.appendChild(p);
            });
            window.scrollTo(0,0);
        }

        function irPara(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
        }

        carregarNuvem();
        renderizarLivros('vt');
    </script>
</body>
</html>
