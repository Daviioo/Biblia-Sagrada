<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --gold: #d4af37; --text: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; }
        
        .header-fixo {
            position: sticky; top: 0; background: var(--panel); 
            padding: 12px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 2px solid var(--gold); z-index: 1000;
        }
        .logo-app { color: var(--gold); font-family: 'Merriweather', serif; font-weight: bold; font-size: 18px; }
        .seletor-versao { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 6px; border-radius: 5px; font-weight: bold; font-size: 13px; }

        .busca-container { padding: 15px 20px; background: #151515; }
        #input-busca { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: var(--panel); color: white; font-size: 16px; }

        .tela { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .ativa { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 10px; }
        .grid-pequena { grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); }
        
        .item { background: var(--panel); padding: 18px 5px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; font-weight: bold; transition: 0.2s; }
        .item:active { background: #222; transform: scale(0.95); border-color: var(--gold); }
        
        .top-nav { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { color: var(--gold); font-size: 26px; cursor: pointer; background: none; border: none; }
        
        #conteudo { line-height: 1.8; font-family: 'Merriweather', serif; font-size: 19px; padding-bottom: 80px; }
        .versiculo { margin-bottom: 16px; padding: 8px; border-radius: 5px; }
        .num { color: var(--gold); font-weight: bold; margin-right: 12px; font-size: 0.8em; }
        .destaque { background: rgba(212, 175, 55, 0.15); border-left: 3px solid var(--gold); }
    </style>
</head>
<body>

    <div class="header-fixo">
        <div class="logo-app">Bíblia Premium</div>
        <select id="global-versao" class="seletor-versao" onchange="aoMudarVersao()">
            <option value="almeida">Almeida</option>
            <option value="nvi">NVI</option>
        </select>
    </div>

    <div id="tela-livros" class="tela ativa">
        <div class="busca-container">
            <input type="text" id="input-busca" placeholder="🔍 Buscar livro..." onkeyup="filtrarLivros()">
        </div>
        <div id="lista-livros" class="grid"></div>
    </div>

    <div id="tela-capitulos" class="tela">
        <div class="top-nav">
            <button class="back-btn" onclick="irPara('tela-livros')">←</button>
            <h2 id="nome-livro" style="color: var(--gold)"></h2>
        </div>
        <div id="lista-capitulos" class="grid grid-pequena"></div>
    </div>

    <div id="tela-escolher-versiculo" class="tela">
        <div class="top-nav">
            <button class="back-btn" onclick="irPara('tela-capitulos')">←</button>
            <h2 id="titulo-cap-v" style="color: var(--gold)"></h2>
        </div>
        <div id="lista-versiculos-grade" class="grid grid-pequena"></div>
    </div>

    <div id="tela-leitura" class="tela">
        <div class="top-nav">
            <button class="back-btn" onclick="irPara('tela-escolher-versiculo')">←</button>
            <h2 id="nome-cap-leitura" style="color: var(--gold)"></h2>
        </div>
        <div id="conteudo"></div>
    </div>
