<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --gold: #d4af37; --text: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; }
        
        /* BARRA FIXA NO TOPO COM O SELETOR */
        .header-fixo {
            position: sticky; top: 0; background: var(--panel); 
            padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 2px solid var(--gold); z-index: 1000;
        }
        .logo-app { color: var(--gold); font-family: 'Merriweather', serif; font-weight: bold; font-size: 18px; }
        
        .seletor-versao {
            background: #000; color: var(--gold); border: 1px solid var(--gold);
            padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 14px;
        }

        .tela { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .ativa { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .item { background: var(--panel); padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; font-weight: bold; }
        
        .top-nav { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { color: var(--gold); font-size: 24px; cursor: pointer; background: none; border: none; }
        
        #conteudo { line-height: 1.8; font-family: 'Merriweather', serif; font-size: 19px; padding-bottom: 100px; }
        .versiculo { margin-bottom: 15px; }
        .num { color: var(--gold); font-weight: bold; margin-right: 10px; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="header-fixo">
        <div class="logo-app">Bíblia Premium</div>
        <select id="global-versao" class="seletor-versao" onchange="aoMudarVersao()">
            <option value="almeida">Almeida (ACF)</option>
            <option value="nvi">NVI (Nova Versão)</option>
            <option value="ara">Almeida (ARA)</option>
            <option value="bbe">Inglês (BBE)</option>
        </select>
    </div>

    <div id="tela-livros" class="tela ativa">
        <div id="lista-livros" class="grid"></div>
    </div>

    <div id="tela-capitulos" class="tela">
        <div class="top-nav">
            <button class="back-btn" onclick="irPara('tela-livros')">←</button>
            <h2 id="nome-livro" style="color: var(--gold)"></h2>
        </div>
        <div id="lista-capitulos" class="grid" style="grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));"></div>
    </div>

    <div id="tela-leitura" class="tela">
        <div class="top-nav">
            <button class="back-btn" onclick="irPara('tela-capitulos')">←</button>
            <h2 id="nome-cap" style="color: var(--gold)"></h2>
        </div>
        <div id="conteudo"></div>
    </div>

    <script>
        const livrosBiblia = ["Gênesis", "Êxodo", "Levítico", "Números", "Deuteronômio", "Josué", "Juízes", "Rute", "1 Samuel", "2 Samuel", "1 Reis", "2 Reis", "1 Crônicas", "2 Crônicas", "Esdras", "Neemias", "Ester", "Jó", "Salmos", "Provérbios", "Eclesiastes", "Cantares", "Isaías", "Jeremias", "Lamentações", "Ezequiel", "Daniel", "Oseias", "Joel", "Amós", "Obadias", "Jonas", "Miqueias", "Naum", "Habacuque", "Sofonias", "Ageu", "Zacarias", "Malaquias", "Mateus", "Marcos", "Lucas", "João", "Atos", "Romanos", "1 Coríntios", "2 Coríntios", "Gálatas", "Efésios", "Filipenses", "Colossenses", "1 Tessalonicenses", "2 Tessalonicenses", "1 Timóteo", "2 Timóteo", "Tito", "Filemom", "Hebreus", "Tiago", "1 Pedro", "2 Pedro", "1 João", "2 João", "3 João", "Judas", "Apocalipse"];
        
        const caps = [50, 40, 27, 36, 34, 24, 21, 4, 31, 24, 22, 25, 29, 36, 10, 13, 10, 42, 150, 31, 12, 8, 66, 52, 5, 48, 12, 14, 3, 9, 1, 4, 7, 3, 3, 3, 2, 14, 4, 28, 16, 24, 21, 28, 16, 16, 13, 6, 6, 4, 4, 5, 3, 6, 4, 3, 1, 13, 5, 5, 3, 5, 1, 1, 1, 22];

        let livroAtual = ""; let capAtual = 1; let telaAtual = "tela-livros";

        function renderizarLivros() {
            const container = document.getElementById('lista-livros');
            livrosBiblia.forEach((nome, i) => {
                const div = document.createElement('div');
                div.className = 'item'; div.innerText = nome;
                div.onclick = () => verCapitulos(nome, caps[i]);
                container.appendChild(div);
            });
        }

        function verCapitulos(nome, total) {
            livroAtual = nome;
            irPara('tela-capitulos');
            document.getElementById('nome-livro').innerText = nome;
            const container = document.getElementById('lista-capitulos');
            container.innerHTML = '';
            for(let i=1; i<=total; i++) {
                const div = document.createElement('div');
                div.className = 'item'; div.innerText = i;
                div.onclick = () => { capAtual = i; carregarVersiculos(); };
                container.appendChild(div);
            }
        }

        async function carregarVersiculos() {
            irPara('tela-leitura');
            document.getElementById('nome-cap').innerText = `${livroAtual} ${capAtual}`;
            const cont = document.getElementById('conteudo');
            cont.innerHTML = "<p style='text-align:center; color:var(--gold)'>Carregando versão...</p>";
            
            const versao = document.getElementById('global-versao').value;

            try {
                const res = await fetch(`https://bible-api.com/${livroAtual}+${capAtual}?translation=${versao}`);
                const data = await res.json();
                cont.innerHTML = "";
                data.verses.forEach(v => {
                    const p = document.createElement('p');
                    p.className = 'versiculo';
                    p.innerHTML = `<span class="num">${v.verse}</span> ${v.text}`;
                    cont.appendChild(p);
                });
                window.scrollTo(0,0);
            } catch (e) {
                cont.innerHTML = "<p style='color:red; text-align:center'>Erro ao conectar. Tente outra versão ou verifique a internet.</p>";
            }
        }

        function aoMudarVersao() {
            if(telaAtual === 'tela-leitura') {
                carregarVersiculos();
            }
        }

        function irPara(id) {
            telaAtual = id;
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
            window.scrollTo(0,0);
        }

        renderizarLivros();
    </script>
</body>
</html>
