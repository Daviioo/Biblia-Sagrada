<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Premium Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3004/3004416.png">

    <link href="https://fonts.googleapis.com/css2?family=Merriweather&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --gold: #d4af37; --text: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; }
        .header-fixo { position: sticky; top: 0; background: var(--panel); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); z-index: 1000; }
        .logo-app { color: var(--gold); font-family: 'Merriweather', serif; font-weight: bold; font-size: 16px; }
        .controles { display: flex; gap: 5px; }
        .btn-f { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 5px 8px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .sel-v { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 5px; border-radius: 4px; font-size: 12px; }
        .tela { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .ativa { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; margin-top: 15px; }
        .grid-v { grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); }
        .item { background: var(--panel); padding: 15px 5px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; font-weight: bold; transition: 0.2s; }
        .item:active { background: #222; border-color: var(--gold); transform: scale(0.95); }
        .nav { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .btn-b { color: var(--gold); font-size: 24px; cursor: pointer; background: none; border: none; }
        #conteudo { line-height: 1.8; font-family: 'Merriweather', serif; font-size: 18px; padding-bottom: 50px; }
        .versiculo { margin-bottom: 15px; }
        .num { color: var(--gold); font-weight: bold; margin-right: 10px; font-size: 0.8em; }
        .destaque { background: rgba(212, 175, 55, 0.2); border-left: 3px solid var(--gold); padding-left: 5px; }
        .msg { text-align: center; color: var(--gold); padding: 20px; }
    </style>
</head>
<body>

    <div class="header-fixo">
        <div class="logo-app">Bíblia Premium</div>
        <div class="controles">
            <button class="btn-f" onclick="mudarF(-2)">A-</button>
            <button class="btn-f" onclick="mudarF(2)">A+</button>
            <select id="v-sel" class="sel-v" onchange="trocarV()">
                <option value="nvi">NVI</option>
                <option value="almeida">Almeida</option>
            </select>
        </div>
    </div>

    <div id="t-livros" class="tela ativa">
        <input type="text" id="busca" placeholder="🔍 Buscar livro..." onkeyup="filtrar()" style="width:100%; padding:12px; border-radius:8px; border:1px solid #333; background:#151515; color:white; margin-bottom:10px;">
        <div id="l-livros" class="grid"></div>
    </div>

    <div id="t-caps" class="tela">
        <div class="nav"><button class="btn-b" onclick="ir('t-livros')">←</button><h2 id="n-livro" style="color:var(--gold)"></h2></div>
        <div id="l-caps" class="grid grid-v"></div>
    </div>

    <div id="t-vers" class="tela">
        <div class="nav"><button class="btn-b" onclick="ir('t-caps')">←</button><h2 id="n-cap-v" style="color:var(--gold)"></h2></div>
        <div id="l-vers" class="grid grid-v"></div>
    </div>

    <div id="t-ler" class="tela">
        <div class="nav"><button class="btn-b" onclick="ir('t-vers')">←</button><h2 id="n-ler" style="color:var(--gold)"></h2></div>
        <div id="conteudo"></div>
    </div>

    <script>
        const biblia = [
            {n:"Gênesis", i:"Genesis", c:50}, {n:"Êxodo", i:"Exodus", c:40}, {n:"Levítico", i:"Leviticus", c:27}, {n:"Números", i:"Numbers", c:36}, {n:"Deuteronômio", i:"Deuteronomy", c:34}, {n:"Josué", i:"Joshua", c:24}, {n:"Juízes", i:"Judges", c:21}, {n:"Rute", i:"Ruth", c:4}, {n:"1 Samuel", i:"1 Samuel", c:31}, {n:"2 Samuel", i:"2 Samuel", c:24}, {n:"1 Reis", i:"1 Kings", c:22}, {n:"2 Reis", i:"2 Kings", c:25}, {n:"1 Crônicas", i:"1 Chronicles", c:29}, {n:"2 Crônicas", i:"2 Chronicles", c:36}, {n:"Esdras", i:"Ezra", c:10}, {n:"Neemias", i:"Nehemiah", c:13}, {n:"Ester", i:"Esther", c:10}, {n:"Jó", i:"Job", c:42}, {n:"Salmos", i:"Psalms", c:150}, {n:"Provérbios", i:"Proverbs", c:31}, {n:"Eclesiastes", i:"Ecclesiastes", c:12}, {n:"Cantares", i:"Song of Solomon", c:8}, {n:"Isaías", i:"Isaiah", c:66}, {n:"Jeremias", i:"Jeremiah", c:52}, {n:"Lamentações", i:"Lamentations", c:5}, {n:"Ezequiel", i:"Ezekiel", c:48}, {n:"Daniel", i:"Daniel", c:12}, {n:"Oseias", i:"Hosea", c:14}, {n:"Joel", i:"Joel", c:3}, {n:"Amós", i:"Amos", c:9}, {n:"Obadias", i:"Obadiah", c:1}, {n:"Jonas", i:"Jonah", c:4}, {n:"Miqueias", i:"Micah", c:7}, {n:"Naum", i:"Nahum", c:3}, {n:"Habacuque", i:"Habakkuk", c:3}, {n:"Sofonias", i:"Zephaniah", c:3}, {n:"Ageu", i:"Haggai", c:2}, {n:"Zacarias", i:"Zechariah", c:14}, {n:"Malaquias", i:"Malachi", c:4},
            {n:"Mateus", i:"Matthew", c:28}, {n:"Marcos", i:"Mark", c:16}, {n:"Lucas", i:"Luke", c:24}, {n:"João", i:"John", c:21}, {n:"Atos", i:"Acts", c:28}, {n:"Romanos", i:"Romans", c:16}, {n:"1 Coríntios", i:"1 Corinthians", c:16}, {n:"2 Coríntios", i:"2 Corinthians", c:13}, {n:"Gálatas", i:"Galatians", c:6}, {n:"Efésios", i:"Ephesians", c:6}, {n:"Filipenses", i:"Philippians", c:4}, {n:"Colossenses", i:"Colossians", c:4}, {n:"1 Tessalonicenses", i:"1 Thessalonians", c:5}, {n:"2 Tessalonicenses", i:"2 Thessalonians", c:3}, {n:"1 Timóteo", i:"1 Timothy", c:6}, {n:"2 Timóteo", i:"2 Timothy", c:4}, {n:"Tito", i:"Titus", c:3}, {n:"Filemom", i:"Philemon", c:1}, {n:"Hebreus", i:"Hebrews", c:13}, {n:"Tiago", i:"James", c:5}, {n:"1 Pedro", i:"1 Peter", c:5}, {n:"2 Pedro", i:"2 Peter", c:3}, {n:"1 João", i:"1 John", c:5}, {n:"2 João", i:"2 John", c:1}, {n:"3 João", i:"3 John", c:1}, {n:"Judas", i:"Jude", c:1}, {n:"Apocalipse", i:"Revelation", c:22}
        ];

        let curL = null; let curC = 1; let curV = []; let curF = 18;

        // Recupera a versão e o tamanho da fonte guardados na memória ao abrir o App
        window.onload = () => {
            const versaoGuardada = localStorage.getItem('biblia_versao');
            if (versaoGuardada) {
                document.getElementById('v-sel').value = versaoGuardada;
            }

            const fonteGuardada = localStorage.getItem('biblia_fonte');
            if (fonteGuardada) {
                curF = parseInt(fonteGuardada);
                document.getElementById('conteudo').style.fontSize = curF + 'px';
            }
            
            renderL();
        };

        function renderL(f = "") {
            const c = document.getElementById('l-livros'); c.innerHTML = '';
            biblia.filter(x => x.n.toLowerCase().includes(f.toLowerCase())).forEach(l => {
                const d = document.createElement('div'); d.className = 'item'; d.innerText = l.n;
                d.onclick = () => { curL = l; ir('t-caps'); document.getElementById('n-livro').innerText = l.n; renderC(l); };
                c.appendChild(d);
            });
        }

        function filtrar() { renderL(document.getElementById('busca').value); }

        function renderC(l) {
            const c = document.getElementById('l-caps'); c.innerHTML = '';
            for(let i=1; i<=l.c; i++) {
                const d = document.createElement('div'); d.className = 'item'; d.innerText = i;
                d.onclick = () => { curC = i; ir('t-vers'); document.getElementById('n-cap-v').innerText = `${l.n} ${i}`; fetchV(i); };
                c.appendChild(d);
            }
        }

        async function fetchV(cap) {
            const cont = document.getElementById('l-vers'); 
            cont.innerHTML = "<p class='msg'>A buscar texto...</p>";
            const ver = document.getElementById('v-sel').value;
            
            let url = "";
            let numLivro = biblia.findIndex(x => x.n === curL.n) + 1;
            
            if (ver === 'nvi') {
                url = `https://bolls.life/get-chapter/NVIPT/${numLivro}/${cap}/`;
            } else {
                url = `https://bible-api.com/${curL.i}+${cap}?translation=almeida`;
            }

            try {
                let res = await fetch(url).catch(() => null);
                
                if (!res || !res.ok) {
                    res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
                }

                const data = await res.json();
                
                if (Array.isArray(data)) {
                    curV = data; 
                } else if (data.verses) {
                    curV = data.verses; 
                } else {
                    throw new Error("Vazio");
                }

                cont.innerHTML = '';
                curV.forEach(v => {
                    const d = document.createElement('div'); d.className = 'item'; d.innerText = v.verse;
                    d.onclick = () => ler(v.verse);
                    cont.appendChild(d);
                });
            } catch (e) {
                cont.innerHTML = "<p class='msg' style='color:#ff6b6b'>Ligação instável. Tenta mudar entre Almeida e NVI ali em cima.</p>";
            }
        }

        function ler(vNum) {
            ir('t-ler'); document.getElementById('n-ler').innerText = `${curL.n} ${curC}`;
            const c = document.getElementById('conteudo'); c.innerHTML = '';
            curV.forEach(v => {
                const p = document.createElement('p'); p.className = `versiculo ${v.verse == vNum ? 'destaque' : ''}`;
                p.id = `v-${v.verse}`; p.innerHTML = `<span class="num">${v.verse}</span> ${v.text}`;
                c.appendChild(p);
            });
            setTimeout(() => { document.getElementById(`v-${vNum}`).scrollIntoView({behavior:'smooth', block:'center'}); }, 200);
        }

        function mudarF(n) { 
            curF += n; 
            document.getElementById('conteudo').style.fontSize = curF + 'px'; 
            // Guarda o tamanho da fonte na memória também!
            localStorage.setItem('biblia_fonte', curF);
        }

        function trocarV() { 
            const versaoEscolhida = document.getElementById('v-sel').value;
            // Guarda a versão na memória do telemóvel
            localStorage.setItem('biblia_versao', versaoEscolhida);
            
            if(document.getElementById('t-vers').classList.contains('ativa')) fetchV(curC); 
        }

        function ir(id) { document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa')); document.getElementById(id).classList.add('ativa'); window.scrollTo(0,0); }

        // MOTOR DO APLICATIVO (PWA) PARA INSTALAR NO ANDROID/APPLE
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('App Instalável Pronto!', reg))
                .catch(err => console.log('Erro no App:', err));
            });
        }
    </script>
</body>
</html>
