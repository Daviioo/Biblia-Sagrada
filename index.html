<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Premium - Navegação Direta</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --gold: #d4af37; --text: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        
        .header-fixo {
            position: sticky; top: 0; background: var(--panel); 
            padding: 12px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 2px solid var(--gold); z-index: 1000;
        }
        .logo-app { color: var(--gold); font-family: 'Merriweather', serif; font-weight: bold; font-size: 18px; }
        .seletor-versao { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 6px; border-radius: 5px; font-weight: bold; font-size: 13px; }

        .busca-container { padding: 15px 20px; background: #151515; }
        #input-busca { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: var(--panel); color: white; font-size: 16px; }

        .tela { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .ativa { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 10px; }
        .grid-pequena { grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); }
        
        .item { background: var(--panel); padding: 18px 5px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; font-weight: bold; transition: 0.2s; }
        .item:active { background: #222; transform: scale(0.95); border-color: var(--gold); }
        
        .top-nav { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { color: var(--gold); font-size: 26px; cursor: pointer; background: none; border: none; }
        
        #conteudo { line-height: 1.8; font-family: 'Merriweather', serif; font-size: 19px; padding-bottom: 80px; }
        .versiculo { margin-bottom: 16px; padding: 8px; border-radius: 5px; }
        .num { color: var(--gold); font-weight: bold; margin-right: 12px; font-size: 0.8em; }
        .destaque { background: rgba(212, 175, 55, 0.15); border-left: 3px solid var(--gold); }
    </style>
</head>
<body>

    <div class="header-fixo">
        <div class="logo-app">Bíblia Premium</div>
        <select id="global-versao" class="seletor-versao" onchange="aoMudarVersao()">
            <option value="nvi">NVI</option>
            <option value="acf">ACF</option>
            <option value="ara">ARA</option>
        </select>
    </div>

    <div id="tela-livros" class="tela ativa">
        <div class="busca-container">
            <input type="text" id="input-busca" placeholder="🔍 Buscar livro..." onkeyup="filtrarLivros()">
        </div>
        <div id="lista-livros" class="grid"></div>
    </div>

    <div id="tela-capitulos" class="tela">
        <div class="top-nav">
            <button class="back-btn" onclick="irPara('tela-livros')">←</button>
            <h2 id="nome-livro" style="color: var(--gold)"></h2>
        </div>
        <div id="lista-capitulos" class="grid grid-pequena"></div>
    </div>

    <div id="tela-escolher-versiculo" class="tela">
        <div class="top-nav">
            <button class="back-btn" onclick="irPara('tela-capitulos')">←</button>
            <h2 id="titulo-cap-v" style="color: var(--gold)"></h2>
        </div>
        <p style="margin-bottom:15px; color:var(--gold); font-weight:bold;">Ir para o versículo:</p>
        <div id="lista-versiculos-grade" class="grid grid-pequena"></div>
    </div>

    <div id="tela-leitura" class="tela">
        <div class="top-nav">
            <button class="back-btn" onclick="irPara('tela-escolher-versiculo')">←</button>
            <h2 id="nome-cap-leitura" style="color: var(--gold)"></h2>
        </div>
        <div id="conteudo"></div>
    </div>

    <script>
        const dados = [
            {n:"Gênesis", a:"gn", c:50}, {n:"Êxodo", a:"ex", c:40}, {n:"Levítico", a:"lv", c:27}, {n:"Números", a:"nm", c:36}, {n:"Deuteronômio", a:"dt", c:34}, {n:"Josué", a:"js", c:24}, {n:"Juízes", a:"jz", c:21}, {n:"Rute", a:"rt", c:4}, {n:"1 Samuel", a:"1sm", c:31}, {n:"2 Samuel", a:"2sm", c:24}, {n:"1 Reis", a:"1rs", c:22}, {n:"2 Reis", a:"2rs", c:25}, {n:"1 Crônicas", a:"1cr", c:29}, {n:"2 Crônicas", a:"2cr", c:36}, {n:"Esdras", a:"ed", c:10}, {n:"Neemias", a:"ne", c:13}, {n:"Ester", a:"et", c:10}, {n:"Jó", a:"job", c:42}, {n:"Salmos", a:"sl", c:150}, {n:"Provérbios", a:"pv", c:31}, {n:"Eclesiastes", a:"ec", c:12}, {n:"Cantares", a:"ct", c:8}, {n:"Isaías", a:"is", c:66}, {n:"Jeremias", a:"jr", c:52}, {n:"Lamentações", a:"lm", c:5}, {n:"Ezequiel", a:"ez", c:48}, {n:"Daniel", a:"dn", c:12}, {n:"Oseias", a:"os", c:14}, {n:"Joel", a:"jl", c:3}, {n:"Amós", a:"am", c:9}, {n:"Obadias", a:"ob", c:1}, {n:"Jonas", a:"jn", c:4}, {n:"Miqueias", a:"mq", c:7}, {n:"Naum", a:"na", c:3}, {n:"Habacuque", a:"hc", c:3}, {n:"Sofonias", a:"sf", c:3}, {n:"Ageu", a:"ag", c:2}, {n:"Zacarias", a:"zc", c:14}, {n:"Malaquias", a:"ml", c:4},
            {n:"Mateus", a:"mt", c:28}, {n:"Marcos", a:"mc", c:16}, {n:"Lucas", a:"lc", c:24}, {n:"João", a:"jo", c:21}, {n:"Atos", a:"at", c:28}, {n:"Romanos", a:"rm", c:16}, {n:"1 Coríntios", a:"1co", c:16}, {n:"2 Coríntios", a:"2co", c:13}, {n:"Gálatas", a:"gl", c:6}, {n:"Efésios", a:"ef", c:6}, {n:"Filipenses", a:"fp", c:4}, {n:"Colossenses", a:"cl", c:4}, {n:"1 Tessalonicenses", a:"1ts", c:5}, {n:"2 Tessalonicenses", a:"2ts", c:3}, {n:"1 Timóteo", a:"1tm", c:6}, {n:"2 Timóteo", a:"2tm", c:4}, {n:"Tito", a:"tt", c:3}, {n:"Filemom", a:"fm", c:1}, {n:"Hebreus", a:"hb", c:13}, {n:"Tiago", a:"tg", c:5}, {n:"1 Pedro", a:"1pe", c:5}, {n:"2 Pedro", a:"2pe", c:3}, {n:"1 João", a:"1jo", c:5}, {n:"2 João", a:"2jo", c:1}, {n:"3 João", a:"3jo", c:1}, {n:"Judas", a:"jd", c:1}, {n:"Apocalipse", a:"ap", c:22}
        ];

        let abrev = ""; let cap = 1; let nomeL = ""; let verSel = 0;

        function renderizarLivros(filtro = "") {
            const container = document.getElementById('lista-livros');
            container.innerHTML = '';
            dados.filter(l => l.n.toLowerCase().includes(filtro.toLowerCase())).forEach(livro => {
                const div = document.createElement('div');
                div.className = 'item'; div.innerText = livro.n;
                div.onclick = () => verCapitulos(livro);
                container.appendChild(div);
            });
        }

        function filtrarLivros() { renderizarLivros(document.getElementById('input-busca').value); }

        function verCapitulos(l) {
            abrev = l.a; nomeL = l.n;
            irPara('tela-capitulos');
            document.getElementById('nome-livro').innerText = l.n;
            const container = document.getElementById('lista-capitulos');
            container.innerHTML = '';
            for(let i=1; i<=l.c; i++) {
                const div = document.createElement('div');
                div.className = 'item'; div.innerText = i;
                div.onclick = () => buscarInfoCapitulo(i);
                container.appendChild(div);
            }
        }

        async function buscarInfoCapitulo(c) {
            cap = c;
            irPara('tela-escolher-versiculo');
            document.getElementById('titulo-cap-v').innerText = `${nomeL} ${cap}`;
            const container = document.getElementById('lista-versiculos-grade');
            container.innerHTML = "<p style='color:var(--gold)'>Calculando versículos...</p>";

            const versao = document.getElementById('global-versao').value;
            try {
                const res = await fetch(`https://www.abibliadigital.com.br/api/verses/${versao}/${abrev}/${cap}`);
                const d = await res.json();
                container.innerHTML = '';
                d.verses.forEach(v => {
                    const div = document.createElement('div');
                    div.className = 'item'; div.innerText = v.number;
                    div.onclick = () => carregarLeitura(d.verses, v.number);
                    container.appendChild(div);
                });
            } catch (e) { container.innerHTML = "<p style='color:red'>Erro de conexão.</p>"; }
        }

        function carregarLeitura(versiculos, vEscolhido) {
            irPara('tela-leitura');
            verSel = vEscolhido;
            document.getElementById('nome-cap-leitura').innerText = `${nomeL} ${cap}`;
            const cont = document.getElementById('conteudo');
            cont.innerHTML = "";
            versiculos.forEach(v => {
                const p = document.createElement('p');
                p.className = `versiculo ${v.number == vEscolhido ? 'destaque' : ''}`;
                p.id = `v-${v.number}`;
                p.innerHTML = `<span class="num">${v.number}</span> ${v.text}`;
                cont.appendChild(p);
            });
            // Rola até o versículo escolhido
            setTimeout(() => {
                document.getElementById(`v-${vEscolhido}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        function aoMudarVersao() { if(document.getElementById('tela-escolher-versiculo').classList.contains('ativa')) buscarInfoCapitulo(cap); }
        
        function irPara(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
            window.scrollTo(0,0);
        }

        renderizarLivros();
    </script>
</body>
</html>
