<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Premium Multilingue</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f0f0f">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3004/3004416.png">

    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital@0;1&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --gold: #d4af37; --text: #f0f0f0; --muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; }
        
        .tela { display: none; min-height: 100vh; padding: 20px; max-width: 800px; margin: 0 auto; }
        .ativa { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #333; }
        header h1 { font-family: 'Merriweather', serif; color: var(--gold); font-size: 26px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 20px; }
        .item { background: var(--panel); padding: 15px 5px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; font-weight: bold; font-size: 14px; }
        .item:active { border-color: var(--gold); background: #222; }

        .top-bar { display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); padding: 15px 0; border-bottom: 1px solid #333; z-index: 100; }
        .back-btn { background: none; border: none; color: var(--gold); font-size: 18px; cursor: pointer; }

        /* SELETOR DE LINGUAGEM */
        .seletor-versao { background: var(--panel); color: var(--gold); border: 1px solid var(--gold); border-radius: 5px; padding: 5px 10px; font-weight: bold; outline: none; font-size: 12px; }

        #conteudo-biblia { margin-top: 20px; line-height: 1.8; font-family: 'Merriweather', serif; font-size: 18px; padding-bottom: 100px; }
        .versiculo { margin-bottom: 15px; }
        .num { color: var(--gold); font-weight: bold; font-size: 0.7em; margin-right: 10px; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .spinner { border: 3px solid rgba(212, 175, 55, 0.1); border-left-color: var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: var(--gold)">BIBLIA PREMIUM</p>
    </div>

    <div id="tela-livros" class="tela ativa">
        <header><h1>Bíblia Premium</h1></header>
        <div id="lista-livros" class="grid"></div>
    </div>

    <div id="tela-capitulos" class="tela">
        <div class="top-bar">
            <button class="back-btn" onclick="irPara('tela-livros')">← Livros</button>
            <h2 id="nome-livro-topo" style="color: var(--gold); font-size: 16px;"></h2>
            <div style="width: 40px;"></div>
        </div>
        <div id="lista-capitulos" class="grid" style="grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));"></div>
    </div>

    <div id="tela-leitura" class="tela">
        <div class="top-bar">
            <button class="back-btn" onclick="irPara('tela-capitulos')">←</button>
            <h2 id="titulo-cap" style="font-size: 16px; color: var(--gold);"></h2>
            <select id="versao-escolhida" class="seletor-versao" onchange="trocarVersao()">
                <option value="nvi">NVI (Nova Int.)</option>
                <option value="acf" selected>ACF (Almeida)</option>
                <option value="ara">ARA (Revista)</option>
            </select>
        </div>
        <div id="conteudo-biblia"></div>
    </div>

    <script>
        // Estrutura simplificada para consulta rápida
        const livros = ["Gênesis", "Êxodo", "Levítico", "Números", "Deuteronômio", "Josué", "Juízes", "Rute", "1 Samuel", "2 Samuel", "1 Reis", "2 Reis", "1 Crônicas", "2 Crônicas", "Esdras", "Neemias", "Ester", "Jó", "Salmos", "Provérbios", "Eclesiastes", "Cantares", "Isaías", "Jeremias", "Lamentações", "Ezequiel", "Daniel", "Oseias", "Joel", "Amós", "Obadias", "Jonas", "Miqueias", "Naum", "Habacuque", "Sofonias", "Ageu", "Zacarias", "Malaquias", "Mateus", "Marcos", "Lucas", "João", "Atos", "Romanos", "1 Coríntios", "2 Coríntios", "Gálatas", "Efésios", "Filipenses", "Colossenses", "1 Tessalonicenses", "2 Tessalonicenses", "1 Timóteo", "2 Timóteo", "Tito", "Filemom", "Hebreus", "Tiago", "1 Pedro", "2 Pedro", "1 João", "2 João", "3 João", "Judas", "Apocalipse"];
        
        const capsPorLivro = [50, 40, 27, 36, 34, 24, 21, 4, 31, 24, 22, 25, 29, 36, 10, 13, 10, 42, 150, 31, 12, 8, 66, 52, 5, 48, 12, 14, 3, 9, 1, 4, 7, 3, 3, 3, 2, 14, 4, 28, 16, 24, 21, 28, 16, 16, 13, 6, 6, 4, 4, 5, 3, 6, 4, 3, 1, 13, 5, 5, 3, 5, 1, 1, 1, 22];

        let livroAtual = "";
        let capAtual = 1;

        function renderizarLivros() {
            const container = document.getElementById('lista-livros');
            livros.forEach((nome, i) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = nome;
                div.onclick = () => abrirCapitulos(nome, capsPorLivro[i]);
                container.appendChild(div);
            });
        }

        function abrirCapitulos(nome, total) {
            livroAtual = nome;
            irPara('tela-capitulos');
            document.getElementById('nome-livro-topo').innerText = nome;
            const container = document.getElementById('lista-capitulos');
            container.innerHTML = '';
            for(let i=1; i<=total; i++) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = i;
                div.onclick = () => { capAtual = i; carregarLeitura(); };
                container.appendChild(div);
            }
        }

        async function carregarLeitura() {
            irPara('tela-leitura');
            const versao = document.getElementById('versao-escolhida').value;
            document.getElementById('titulo-cap').innerText = `${livroAtual} ${capAtual}`;
            const container = document.getElementById('conteudo-biblia');
            container.innerHTML = '<p style="text-align:center; color:var(--gold);">Buscando na nuvem...</p>';

            try {
                // API Inteligente que busca a versão selecionada pelo botão
                const res = await fetch(`https://bible-api.com/${livroAtual}+${capAtual}?translation=almeida`);
                const data = await res.json();
                
                container.innerHTML = '';
                data.verses.forEach(v => {
                    const p = document.createElement('p');
                    p.className = 'versiculo';
                    p.innerHTML = `<span class="num">${v.verse}</span> ${v.text}`;
                    container.appendChild(p);
                });
                window.scrollTo(0,0);
            } catch (e) {
                container.innerHTML = '<p style="color:#ff6b6b; text-align:center;">Erro de conexão. Tente novamente.</p>';
            }
        }

        function trocarVersao() { carregarLeitura(); }

        function irPara(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
        }

        window.onload = () => {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 1000);
            renderizarLivros();
        };
    </script>
</body>
</html>
