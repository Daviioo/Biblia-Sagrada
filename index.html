<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Sagrada Ultra Leve</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --gold: #d4af37; --text: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; }
        .tela { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .ativa { display: block; }
        header { text-align: center; padding: 20px 0; color: var(--gold); font-family: 'Merriweather', serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
        .item { background: var(--panel); padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; }
        .top-bar { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #333; position: sticky; top: 0; background: var(--bg); }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        #conteudo { margin-top: 20px; line-height: 1.8; font-family: 'Merriweather', serif; font-size: 18px; }
        .versiculo { margin-bottom: 15px; }
        .num { color: var(--gold); font-weight: bold; margin-right: 10px; font-size: 0.8em; }
        .loading-msg { text-align: center; color: var(--gold); margin-top: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="tela-livros" class="tela ativa">
        <header><h1>Bíblia Sagrada</h1></header>
        <div id="lista-livros" class="grid"></div>
    </div>

    <div id="tela-capitulos" class="tela">
        <div class="top-bar">
            <div class="back-btn" onclick="irPara('tela-livros')">← Voltar</div>
            <h2 id="nome-livro" style="color: var(--gold)"></h2>
        </div>
        <div id="lista-capitulos" class="grid"></div>
    </div>

    <div id="tela-leitura" class="tela">
        <div class="top-bar">
            <div class="back-btn" onclick="irPara('tela-capitulos')">← Capítulos</div>
            <h2 id="nome-cap" style="color: var(--gold)"></h2>
        </div>
        <div id="conteudo"></div>
    </div>

    <script>
        // Lista de livros e quantos capítulos cada um tem (para não precisar baixar tudo de uma vez)
        const bibliaInfo = [
            {n:"Gênesis", c:50}, {n:"Êxodo", c:40}, {n:"Levítico", c:27}, {n:"Números", c:36}, {n:"Deuteronômio", c:34},
            {n:"Josué", c:24}, {n:"Juízes", c:21}, {n:"Rute", c:4}, {n:"1 Samuel", c:31}, {n:"2 Samuel", c:24},
            {n:"1 Reis", c:22}, {n:"2 Reis", c:25}, {n:"1 Crônicas", c:29}, {n:"2 Crônicas", c:36}, {n:"Esdras", c:10},
            {n:"Neemias", c:13}, {n:"Ester", c:10}, {n:"Jó", c:42}, {n:"Salmos", c:150}, {n:"Provérbios", c:31},
            {n:"Eclesiastes", c:12}, {n:"Cantares", c:8}, {n:"Isaías", c:66}, {n:"Jeremias", c:52}, {n:"Lamentações", c:5},
            {n:"Ezequiel", c:48}, {n:"Daniel", c:12}, {n:"Oseias", c:14}, {n:"Joel", c:3}, {n:"Amós", c:9},
            {n:"Obadias", c:1}, {n:"Jonas", c:4}, {n:"Miqueias", c:7}, {n:"Naum", c:3}, {n:"Habacuque", c:3},
            {n:"Sofonias", c:3}, {n:"Ageu", c:2}, {n:"Zacarias", c:14}, {n:"Malaquias", c:4},
            {n:"Mateus", c:28}, {n:"Marcos", c:16}, {n:"Lucas", c:24}, {n:"João", c:21}, {n:"Atos", c:28},
            {n:"Romanos", c:16}, {n:"1 Coríntios", c:16}, {n:"2 Coríntios", c:13}, {n:"Gálatas", c:6}, {n:"Efésios", c:6},
            {n:"Filipenses", c:4}, {n:"Colossenses", c:4}, {n:"1 Tessalonicenses", c:5}, {n:"2 Tessalonicenses", c:3},
            {n:"1 Timóteo", c:6}, {n:"2 Timóteo", c:4}, {n:"Tito", c:3}, {n:"Filemom", c:1}, {n:"Hebreus", c:13},
            {n:"Tiago", c:5}, {n:"1 Pedro", c:5}, {n:"2 Pedro", c:3}, {n:"1 João", c:5}, {n:"2 João", c:1},
            {n:"3 João", c:1}, {n:"Judas", c:1}, {n:"Apocalipse", c:22}
        ];

        let livroAtual = "";

        function renderizarLivros() {
            const lista = document.getElementById('lista-livros');
            bibliaInfo.forEach(livro => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = livro.n;
                div.onclick = () => verCapitulos(livro);
                lista.appendChild(div);
            });
        }

        function verCapitulos(livro) {
            livroAtual = livro.n;
            irPara('tela-capitulos');
            document.getElementById('nome-livro').innerText = livro.n;
            const lista = document.getElementById('lista-capitulos');
            lista.innerHTML = "";
            for(let i=1; i<=livro.c; i++) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = i;
                div.onclick = () => carregarCapitulo(livro.n, i);
                lista.appendChild(div);
            }
        }

        async function carregarCapitulo(livro, cap) {
            irPara('tela-leitura');
            document.getElementById('nome-cap').innerText = `${livro} ${cap}`;
            const cont = document.getElementById('conteudo');
            cont.innerHTML = "<p class='loading-msg'>Buscando na nuvem...</p>";

            try {
                // API que busca APENAS o capítulo necessário (super rápido e não trava)
                const res = await fetch(`https://bible-api.com/${livro}+${cap}?translation=almeida`);
                const data = await res.json();
                
                cont.innerHTML = "";
                data.verses.forEach(v => {
                    const p = document.createElement('p');
                    p.className = 'versiculo';
                    p.innerHTML = `<span class="num">${v.verse}</span> ${v.text}`;
                    cont.appendChild(p);
                });
            } catch (e) {
                cont.innerHTML = "<p style='color:red'>Erro ao carregar. Verifique a internet.</p>";
            }
        }

        function irPara(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
            window.scrollTo(0,0);
        }

        renderizarLivros();
    </script>
</body>
</html>
